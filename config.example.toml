# NPlan model config
#
# This follows the same shape as Codex-style model provider config:
# a default model, a selected provider, and provider-specific HTTP settings.
# `models_url` is optional and is used by `nplan setup` to fetch model choices.
# `context_location` is `local` or `cloud`; custom providers may omit it and
# NPlan will classify loopback base URLs as local. A built-in base URL override
# without this field also uses that URL-based fallback.
# `nplan setup` shows canonical providers in recommended cloud, local, and more
# groups; compatibility aliases remain valid in existing config files.
# `nplan doctor` is offline by default. `nplan doctor --online` only calls the
# selected provider's `models_url` (or `<base_url>/models`) health endpoint.

model = "gpt-5.5"
model_provider = "openai"
model_temperature = 0.1
model_max_output_tokens = 2000

[model_providers.openai]
name = "OpenAI"
context_location = "cloud"
base_url = "https://api.openai.com/v1"
env_key = "OPENAI_API_KEY"
wire_api = "responses"
models_url = "https://api.openai.com/v1/models"
request_max_retries = 2
timeout_ms = 60000

[model_providers.openrouter]
name = "OpenRouter"
context_location = "cloud"
base_url = "https://openrouter.ai/api/v1"
env_key = "OPENROUTER_API_KEY"
wire_api = "chat_completions"
request_max_retries = 2
timeout_ms = 60000

